; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
default_envs = esp32dev

[common]
lib_deps_builtin =
    SPI
    Wire
    SD

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    ${common.lib_deps_builtin}
    pololu/VL53L1X@^1.3.1                           ; ToF sensors
    adafruit/Adafruit LED Backpack Library@^1.5.1   ; LED Matrix
    ronny-antoon/NVSDatabase@^2.0.0                 ; Flash storage database
    https://github.com/adafruit/Adafruit_SSD1306    ; OLED screen
    https://github.com/robjen/GFX_fonts             ; extra fonts for OLED
monitor_speed = 115200
upload_speed = 921600
extra_scripts = pre:extra_script.py
